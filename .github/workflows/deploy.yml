name: Deploy DentFlow AE to Firebase

# Trigger this workflow on push to the main branch
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # Step 3: Install project dependencies
      - name: Install dependencies
        run: npm install

      # Step 4: Build the project
      - name: Build project
        run: npm run build

      # Step 5: Deploy to Firebase Hosting
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          # GitHub Secret containing Firebase CI token
          repoToken: "${{ secrets.FIREBASE_TOKEN }}"
          # Firebase project ID
          projectId: "dent-flow-ae"
          # Deployment channel (use "preview" for testing, "live" for production)
          channelId: "live"
