name: Deploy DentFlow AE to Firebase

# Force GitHub Actions to run on Node.js 24 to avoid deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Trigger this workflow only on relevant changes to the main branch
on:
  push:
    branches:
      - main
    # Ignore changes to docs, README, or any file outside 'dent-flow/'
    paths:
      - 'dent-flow/**'
    paths-ignore:
      - 'README.md'
      - 'docs/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # Step 3: Install project dependencies inside 'dent-flow' folder
      - name: Install dependencies
        run: npm install
        working-directory: ./dent-flow

      # Step 4: Build the project inside 'dent-flow' folder
      - name: Build project
        run: npm run build
        working-directory: ./dent-flow

      # Step 5: Deploy the built project to Firebase Hosting
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          projectId: dent-flow-ae
          channelId: live
          entryPoint: ./dent-flow
